name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      # Package.swift declares swift-tools-version 6.0; pin a toolchain new
      # enough for that rather than trusting the runner image's default.
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build
        run: swift build

      - name: Test
        run: swift test
